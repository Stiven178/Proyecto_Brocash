<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pagina principal Brocash</title>
    <link rel="stylesheet" href="Style.css"> 
</head>

<body>
<header class="header">
    <div class="encabezado">
        <img src="Logos/Logo.png" class="logo">
        <h1>Brocash</h1>
    </div>
</header>
<div class="container">
    <form class="form-card">

        <h2>Bienvenido</h2>
        <p>Tu plataforma de crédito en línea</p>

        <input type="text" placeholder="Cédula" required>
        <input type="password" placeholder="Contraseña" required>
        <label class="check">
            <input type="checkbox"> Recordar
        </label>
        <button type="submit">Ingresar</button>
